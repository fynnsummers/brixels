<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brixel | Alpha</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" sizes="64x64">
    <link rel="stylesheet" href="css/load.css">
</head>
<body>
    <div id="start-screen">
        <canvas id="bg-canvas"></canvas>
        <div class="overlay"></div>
        <div class="content">
            <img id="title-logo" src="assets/title.png" alt="Block World">
            <button id="new-game-btn" class="pixel-button">New Game</button>
            <button id="help-btn" class="pixel-button">Recipes</button>
            <button id="items-btn" class="pixel-button">Item Index</button>
            <p class="version">v<span id="version-start"></span></p>
        </div>
    </div>

    <div id="loading-screen" class="hidden">
        <canvas id="loading-canvas"></canvas>
        <div class="overlay"></div>
        <div class="loading-content">
            <h2>Generating World...</h2>
            <img id="loading-gif" src="assets/ui/loading.gif" alt="Loading...">
            <p class="version">v<span id="version-loading"></span></p>
        </div>
    </div>

    <!-- Help Overlay -->
    <div id="help-overlay" class="hidden">
        <div class="help-content">
            <div class="help-header">
                <h2>Crafting Recipes</h2>
                <button id="close-help-btn" class="close-btn">×</button>
            </div>
            <input type="text" id="recipe-search" class="recipe-search" placeholder="Search recipes...">
            <div id="recipe-list" class="recipe-list">
                <!-- Recipes will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <!-- Item Index Overlay -->
    <div id="items-overlay" class="hidden">
        <div class="help-content">
            <div class="help-header">
                <h2>Item Index</h2>
                <button id="close-items-btn" class="close-btn">×</button>
            </div>
            <input type="text" id="item-search" class="recipe-search" placeholder="Search items...">
            <div id="item-list" class="item-list">
                <!-- Items will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <audio id="bg-music" loop volume="0.01">
        <source src="assets/homemc.mp3" type="audio/mpeg">
    </audio>

    <script src="js/core/config.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/items.js"></script>
    <script src="js/ui/recipes.js"></script>
    <script src="js/world/world.js"></script>
    <script src="js/screens/load.js"></script>
</body>
</html>
